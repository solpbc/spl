name = "spl-relay"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Production routes are wired per environment; self-hosters replace these
# values with their own hostnames before `wrangler deploy`. Sol pbc's hosted
# relay is at link.solstone.app.
# routes = [
#   { pattern = "link.solstone.app", custom_domain = true }
# ]

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "INSTANCE", class_name = "InstanceDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InstanceDO"]

# Non-secret configuration. Secrets (SIGNING_JWK, JWKS_PUBLIC) are set via
# `wrangler secret put` and are NEVER committed here. ISSUER is the JWT
# `iss` claim the Worker enforces on every verify; self-hosters override in
# their env block.
[vars]
ENVIRONMENT = "development"
ISSUER = "spl.local"

# D1 database for token metadata. Override `database_id` per environment.
# `database_id` is populated by `wrangler d1 create` and is not sensitive —
# but we leave it blank by default so `wrangler deploy` fails loudly if the
# operator hasn't provisioned D1 yet.
[[d1_databases]]
binding = "DB"
database_name = "spl-relay-dev"
database_id = ""
migrations_dir = "migrations"

# Staging environment. Historical pre-release/TestFlight relay, not production.
# It uses its own D1 database and its own SIGNING_JWK + JWKS_PUBLIC secrets.
[env.staging]
name = "spl-relay-staging"
vars = { ENVIRONMENT = "staging", ISSUER = "spl-staging.solpbc.org" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "spl-relay-staging"
database_id = "778edf39-815e-49df-8d92-fb05e454a118"
migrations_dir = "migrations"

[[env.staging.durable_objects.bindings]]
name = "INSTANCE"
class_name = "InstanceDO"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["InstanceDO"]

# Production environment. Secrets are provisioned with `wrangler secret put`;
# the custom domain route is created by `wrangler deploy --env production`.
[env.production]
name = "spl-relay"
routes = [{ pattern = "link.solstone.app", custom_domain = true }]
vars = { ENVIRONMENT = "production", ISSUER = "link.solstone.app" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "spl-relay"
database_id = "989a04e6-09b0-4176-a228-e49b61401908"
migrations_dir = "migrations"

[[env.production.durable_objects.bindings]]
name = "INSTANCE"
class_name = "InstanceDO"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["InstanceDO"]
