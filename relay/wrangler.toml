name = "spl-relay"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Production routes are wired per environment; self-hosters replace these
# values with their own hostnames before `wrangler deploy`. Sol pbc's hosted
# relay is at link.solstone.app.
# routes = [
#   { pattern = "link.solstone.app", custom_domain = true }
# ]

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "INSTANCE", class_name = "InstanceDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["InstanceDO"]

# Non-secret configuration. Secrets (SIGNING_JWK, JWKS_PUBLIC, GRANT_SECRET)
# are set via `wrangler secret put` and are NEVER committed here. ISSUER is the
# JWT `iss` claim the Worker enforces on every verify; self-hosters override in
# their env block. ENTITLEMENT_REQUIRED is off by default; only the exact string
# "true" enables the session gate.
[vars]
ENVIRONMENT = "development"
ISSUER = "spl.local"

# D1 database for token metadata. Override `database_id` per environment.
# `database_id` is populated by `wrangler d1 create` and is not sensitive —
# but we leave it blank by default so `wrangler deploy` fails loudly if the
# operator hasn't provisioned D1 yet.
[[d1_databases]]
binding = "DB"
database_name = "spl-relay-dev"
database_id = ""
migrations_dir = "migrations"

# Production environment. Secrets are provisioned with `wrangler secret put`;
# the custom domain route is created by `wrangler deploy --env production`.
#
# ENTITLEMENT_REQUIRED stays "false" until the deliberate paid-tier go-live.
# link.solstone.app already serves live SPL users (pair-from-anywhere) who hold
# NO entitlement grant — flipping the gate on before billing is live + existing
# instances are grandfathered would 402-lock every current user. Go-live order:
# (1) deploy the account-portal billing rail to prod + provision its secrets;
# (2) push grants for all existing/comp instances (grandfather);
# (3) THEN set this to "true" and redeploy; (4) gated on sales-tax/DPA/payout/credits.
[env.production]
name = "spl-relay"
routes = [{ pattern = "link.solstone.app", custom_domain = true }]
vars = { ENVIRONMENT = "production", ISSUER = "link.solstone.app", ENTITLEMENT_REQUIRED = "false" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "spl-relay"
database_id = "989a04e6-09b0-4176-a228-e49b61401908"
migrations_dir = "migrations"

[[env.production.durable_objects.bindings]]
name = "INSTANCE"
class_name = "InstanceDO"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["InstanceDO"]
