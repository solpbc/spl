name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Contributors can fork and run CI on their PRs. Production deploys are
# manual — no GITHUB_TOKEN or CF API token is ever referenced in this
# workflow. See AGENTS.md §5 "git" and solcf/README.md "deploy".

permissions:
  contents: read

jobs:
  solcf:
    name: solcf (typescript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solcf
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: solcf/package-lock.json
      - run: npm ci
      - run: make ci

  home:
    name: home (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: home
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - run: make ci
